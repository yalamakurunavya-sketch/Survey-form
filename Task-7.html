<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task-7</title>
    <style>
        body{
            background-color: black;
            color: white;
        }
        h1{
            margin-bottom: 30px;
        }
        .display{
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }
        .display .abc{
            flex: 1;
            position: relative;
            background-color: rgb(56, 51, 51);
        }
        .abc img{
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;   
        }
        .abc span{
            display: block;
            font-size: 24px;
            margin-top: 20px;
            padding: 0 20px;
        }
        .abc p{
            margin-top: 5px;
            margin-bottom: 30px; 
            padding: 0 20px;
            font-size: 16px;
        }
        .abc button{
            width: 45px;
            height: 45px;
            background-color: rgb(70, 70, 142);
            color: white;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            bottom: 20px;
            right: 20px;
            border: none;
            outline: none;
            box-shadow: none;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <h1>Cutting edge solutions to power up your business</h1>
    <div class="display">
        <div class="abc">
            <img src="../IMAGE-1.jpg">
            <span>Industries</span>
            <p>Select your industry. Discover our impact.</p>
            <button>→</button>
        </div>
        <div class="abc">
            <img src="../IMAGES/Image-2.png">
            <span>Services</span>
            <p>Experience our services.<br>
               Transform your business.</p>
            <button>→</button>
        </div>
        <div class="abc">
            <img src="../IMAGES/IMAGE-3.png">
            <span>Products and platforms</span>
            <p>Explore our products.<br> Accelerate your performance.</p>
            <button>→</button>
        </div>
    </div>
</body>
</html>
