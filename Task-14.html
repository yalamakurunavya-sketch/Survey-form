<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body {
            font-family: Arial;
            background: white;
        }
        h1 {
            text-align: center;
            margin-top: 20px;
        }
        .container {
            width: 700px;
            margin: 40px auto;
            background: rgb(204, 215, 226);
            padding:30px;
            border-radius: 5px;
        }
        .abc {
            display: flex;
            margin-bottom: 15px;
            align-items: center;
        }
        .abc label {
            width: 250px;
            text-align: right;
            padding-right: 15px;
        }
        .abc input,
        .abc select,
        .abc textarea {
            width: 250px;
            padding: 5px;
        }
        .options {
            width: 250px;
        }
        .options input {
            width: auto;
        }
        button {
            margin-left: 265px;
            padding: 8px 20px;
            color: green;
        }
    </style>
</head>
<body>
    <h1>STUDENT REGISTRATION FORM</h1>
    <form>
        <div class="container">
            <div class="abc">
                <label>FULL NAME:</label>
                <input type="text" placeholder="Enter your full name">
            </div>
            <div class="abc">
                <label>MOBILE NUMBER:</label>
                <input type="tel" placeholder="Enter your 10 digit number">
            </div>
            <div class="abc">
                <label>Email:</label>
                <input type="email" placeholder="Type your email here">
            </div>
            <div class="abc">
                <label>Address:</label>
                <textarea placeholder="Type your address here"></textarea>
            </div>
            <div class="abc">
                <label>Date of Birth:</label>
                <input type="date">
            </div>
            <div class="abc">
                <label>School Name:</label>
                <select>
                    <option>Select here..</option>
                    <option>Keshava Reddy High School</option>
                    <option>Sri Chaitanya High School</option>
                    <option>Narayana High School</option>
                    <option>Edify High School</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="abc">
                <label>CGPA:</label>
                <input type="number">
            </div>
            <div class="abc">
                <label>Intermediate College:</label>
                <select>
                    <option>Select here...</option>
                    <option>Sri Chaitanya Junior College</option>
                    <option>Narayana Junior College</option>
                    <option>Deepti Junior College</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="abc">
                <label>Percentage:</label>
                <input type="text">
            </div>
            <div class="abc">
                <label>Graduation College:</label>
                <select>
                    <option>Select your college</option>
                    <option>Kalasalingam University</option>
                    <option>Veltech University</option>
                    <option>SRM University</option>
                    <option>MGR University</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="abc">
                <label>Department:</label>
                <div class="options">
                    <input type="radio" name="dept"> CSE <br>
                    <input type="radio" name="dept"> ECE <br>
                    <input type="radio" name="dept"> EEE <br>
                    <input type="radio" name="dept"> CIVIL <br>
                    <input type="radio" name="dept"> MECHANICAL <br>
                    <input type="radio" name="dept"> AERONAUTICAL
                </div>
            </div>
            <div class="abc">
                <label>Pass Out Year:</label>
                <input type="date">
            </div>
            <div class="abc">
                <label>Comments:</label>
                <textarea></textarea>
            </div>
            <button type="submit">SUBMIT</button>
        </div>
    </form>
</body>
</html>
